  });
  const [customProviders, setCustomProviders] = useState(()=>Storage.get("customProviders")||[]);
  const [activeProvider, setActiveProvider] = useState(()=>Storage.get("activeProvider")||"chatgpt");
  const [providerStatus, setProviderStatus] = useState({});
  const [testStatus, setTestStatus] = useState({});
  const [view, setView] = useState("chat"); // "chat" | "arena" | "council"
  const [showSettings, setShowSettings] = useState(false);
  const [smartMode, setSmartMode] = useState(()=>Storage.get("smartMode")||false);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [loadingInfo, setLoadingInfo] = useState("");
  const [pair, setPair] = useState("");
  const [files, setFiles] = useState([]);
  const [dragging, setDragging] = useState(false);
  const [fileErr, setFileErr] = useState("");
  // Universal Memory
  const [universalMemory, setUniversalMemory] = useState(()=>MemoryManager.createFresh());
  const memoryRef = useRef(universalMemory);
  useEffect(()=>{ memoryRef.current=universalMemory; },[universalMemory]);
  // Init MemoryManager (IndexedDB)
  useEffect(()=>{
    MemoryManager.init().then(async()=>{
      const saved = await MemoryManager.load();
      if(saved && saved.shortMemory){
        setUniversalMemory(saved);
        memoryRef.current = saved;
      }
    });
  },[]);
  // Arena state
  const [arenaSelected, setArenaSelected] = useState([]);
  const [arenaResults, setArenaResults] = useState({});
  const [arenaLoading, setArenaLoading] = useState({});
  const [arenaInput, setArenaInput] = useState("");
  // Council state
  const [councilInput, setCouncilInput] = useState("");
  const [councilLoading, setCouncilLoading] = useState(false);
  const [councilResponses, setCouncilResponses] = useState({});
  const [councilResponseLoading, setCouncilResponseLoading] = useState({});
  const [councilResult, setCouncilResult] = useState(null);
  const [councilMemory, setCouncilMemory] = useState(()=>CouncilMemory.getAll(PROVIDER_REGISTRY.map(p=>p.id)));
  const [councilTab, setCouncilTab] = useState("session"); // "session"|"stats"|"timeline"|"health"
  const [councilTimeline, setCouncilTimeline] = useState([]);
  const [councilSelected, setCouncilSelected] = useState([]); // which providers participate
  const [councilFeedback, setCouncilFeedback] = useState(null); // "helpful"|"not_helpful"

  const bottomRef = useRef(null);
  const inputRef = useRef(null);
  const fileRef = useRef(null);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[messages,loading]);

  const allProviders = useMemo(()=>ProviderManager.getAll(customProviders),[customProviders]);
  const enabledProviders = useMemo(()=>ProviderManager.getEnabled(allProviders,configs),[allProviders,configs]);
  const hasAnyKey = enabledProviders.length>0;
  const curProv = allProviders.find(p=>p.id===activeProvider)||allProviders[0];

  // Persist configs
  useEffect(()=>{
    const s=Storage.load();
    const custom={};
    for(const p of customProviders) custom[p.id]=configs[p.id];
    Storage.save({...s,...configs,customProviders,customConfigs:custom,activeProvider,smartMode});
  },[configs,customProviders,activeProvider,smartMode]);

  // File handling
  const addFiles = useCallback((newFiles)=>{
    setFileErr("");
    const toAdd=[];
    for(const f of newFiles){
      if(f.size>MAX_FILE){setFileErr(`"${f.name}" terlalu besar (maks 20MB)`);continue;}
      if(files.some(x=>x.name===f.name&&x.size===f.size)) continue;
      toAdd.push(f);
    }
    setFiles(prev=>[...prev,...toAdd].slice(0,5));
  },[files]);
  useEffect(()=>{
    const h=e=>{const fs=[];for(const it of e.clipboardData?.items||[]){if(it.kind==="file"){const f=it.getAsFile();if(f)fs.push(f);}}if(fs.length)addFiles(fs);};
    window.addEventListener("paste",h);return()=>window.removeEventListener("paste",h);
  },[addFiles]);

  // Fallback order
  const getFallbackOrder = useCallback((preferredPid)=>{
    const pid = preferredPid||activeProvider;
    const ordered=[pid,...PROVIDER_REGISTRY.map(p=>p.id),...customProviders.map(p=>p.id)].filter((v,i,a)=>a.indexOf(v)===i);
    return ordered.filter(id=>enabledProviders.find(p=>p.id===id)).map(id=>allProviders.find(p=>p.id===id)).filter(Boolean);
  },[activeProvider,enabledProviders,allProviders,customProviders]);

  // Connection test
  async function handleTest(provider){
    const cfg=configs[provider.id]||{};
    setTestStatus(s=>({...s,[provider.id]:"testing"}));
    const result=await ConnectionTester.test(provider,cfg);
    setTestStatus(s=>({...s,[provider.id]:result.ok?"ok":"err"}));
  }

  // Send message (chat mode) — with Universal Memory + Provider Handover
  const sendMessage = useCallback(async(text)=>{
    const userText=(text||input).trim();
    if((!userText&&files.length===0)||loading) return;
    if(!hasAnyKey){setShowSettings(true);return;}
    setFileErr("");
    const curFiles=[...files];
    setFiles([]);setInput("");setLoading(true);setLoadingInfo("");

    try{
      // Smart router
      let preferredPid = activeProvider;
      if(smartMode){
        const best = SmartRouter.pickBest(userText, enabledProviders);
        if(best) preferredPid=best.id;
      }

      const activeP = allProviders.find(p=>p.id===preferredPid)||curProv;
      const isVision = ProviderManager.getModel(activeP,configs).vision;
      const {apiContent,attachments} = await ChatEngine.buildContent(userText,curFiles,isVision);

      // Update universal memory with user message
      let mem = {...memoryRef.current};
      mem = ConversationMemoryEngine.addMessage(mem, "user", userText, {attachments});
      // Add files to memory
      for(const att of attachments) mem = ConversationMemoryEngine.addFile(mem, att);
      mem = ConversationStateEngine.update(mem, userText, activeP.name);
      setUniversalMemory(mem);
      memoryRef.current = mem;
      await MemoryManager.save(mem);

      setMessages(prev=>[...prev,{role:"user",content:userText,attachments}]);

      const tryOrder = getFallbackOrder(preferredPid);
      let lastErr=null;
      let handoverPkg = null;

      for(let i=0;i<tryOrder.length;i++){
        const prov=tryOrder[i];
        const cfg=configs[prov.id];
        if(i===0){
          setLoadingInfo(`${prov.name}...`);
        } else {
          // Build handover package for seamless context transfer
          handoverPkg = ProviderHandoverEngine.buildHandoverPackage(memoryRef.current, tryOrder[i-1].id, prov.id, userText);
          setLoadingInfo(`Rate limit — handover ke ${prov.name}...`);
        }

        try{
          // Use compressed history (memory-aware)
          const apiHistory = ContextCompressionEngine.buildApiHistory(memoryRef.current);
          // If handover, inject handover context into system prompt
          const systemToUse = handoverPkg
            ? ProviderHandoverEngine.buildHandoverSystemPrompt(handoverPkg, SYSTEM_PROMPT)
            : SYSTEM_PROMPT;

          const modelObj = prov.models.find(m=>m.id===cfg.model)||prov.models[0];
          let safeContent = apiContent;
          if(!modelObj.vision&&Array.isArray(apiContent)) safeContent=ChatEngine.contentToString(apiContent);
          if(!safeContent||(typeof safeContent==="string"&&!safeContent.trim())) safeContent=" ";

          const t0call = Date.now();
          const body = {model:cfg.model||modelObj.id, max_tokens:2048, messages:[
            {role:"system",content:systemToUse},
            ...apiHistory,
            {role:"user",content:safeContent},
          ]};
          const headers = {"Content-Type":"application/json","Authorization":`Bearer ${cfg.key}`,...(prov.extraHeaders||{})};
          const res = await fetch(prov.baseUrl,{method:"POST",headers,body:JSON.stringify(body),signal:AbortSignal.timeout(30000)});
          const data = await res.json();
          if(!res.ok){
            const errMsg = data.error?.message||`HTTP ${res.status}`;
            ProviderHealthMonitor.recordError(prov.id, errMsg, res.status);
            if(FallbackEngine.isRetriable(res.status,errMsg)) throw Object.assign(new Error(errMsg),{isRateLimit:true});
            if(FallbackEngine.isAuthError(res.status)) throw Object.assign(new Error("API Key tidak valid — "+prov.name),{isAuth:true});
            throw new Error(errMsg);
          }
          const reply = data.choices?.[0]?.message?.content||"(no response)";
          ProviderHealthMonitor.recordSuccess(prov.id, Date.now()-t0call);

          setProviderStatus(s=>({...s,[prov.id]:"ok"}));
          if(prov.id!==activeProvider){setActiveProvider(prov.id);}

          // Update memory with AI reply
          let memAfter = {...memoryRef.current};
          memAfter = ConversationMemoryEngine.addMessage(memAfter, "assistant", reply, {provider:prov.name});
          memAfter = ConversationStateEngine.update(memAfter, userText, prov.name);
          memAfter = ConversationMemoryEngine.updateWorkingMemory(memAfter, {currentObjective: userText.slice(0,100)});
          setUniversalMemory(memAfter);
          memoryRef.current = memAfter;

          // Auto-save memory
          await MemoryManager.save(memAfter);

          // Background: generate summary (non-blocking)
          SummaryGenerator.generate(memAfter, userText, reply, prov.name, configs, allProviders)
            .then(async(updatedMem)=>{
              setUniversalMemory(updatedMem);
              memoryRef.current = updatedMem;
              await MemoryManager.save(updatedMem);
            }).catch(()=>{});

          setMessages(prev=>[...prev,{role:"assistant",content:reply,usedProvider:prov.name,providerIcon:prov.icon,providerColor:prov.color}]);
          lastErr=null;break;
        }catch(e){
          lastErr=e;
          setProviderStatus(s=>({...s,[prov.id]:e.isRateLimit?"warn":"err"}));
          continue;
        }
      }
      if(lastErr) setMessages(prev=>[...prev,{role:"assistant",content:`Semua provider gagal.\n\nError: ${lastErr.message}\n\nSetup API key via Settings.`}]);
    }catch(e){
      setMessages(prev=>[...prev,{role:"assistant",content:`Error: ${e.message}`}]);
    }finally{
      setLoading(false);setLoadingInfo("");
      setTimeout(()=>inputRef.current?.focus(),80);
    }
  },[input,files,loading,hasAnyKey,activeProvider,smartMode,enabledProviders,allProviders,configs,curProv,getFallbackOrder]);

  // Arena send
  async function sendArena(){
    const q=arenaInput.trim();
    if(!q||arenaSelected.length===0) return;
    const newResults={};const newLoading={};
    arenaSelected.forEach(pid=>{newResults[pid]=null;newLoading[pid]=true;});
    setArenaResults(newResults);setArenaLoading(newLoading);
    await Promise.allSettled(arenaSelected.map(async pid=>{
      const prov=allProviders.find(p=>p.id===pid);
      const cfg=configs[pid];
      if(!prov||!cfg?.key) return;
      try{
        const {apiContent}=await ChatEngine.buildContent(q,[],ProviderManager.getModel(prov,configs).vision);
        const res=await ChatEngine.callProvider(prov,cfg,apiContent,[]);
        setArenaResults(r=>({...r,[pid]:res.reply}));
      }catch(e){
        setArenaResults(r=>({...r,[pid]:`Error: ${e.message}`}));
      }finally{
        setArenaLoading(l=>({...l,[pid]:false}));
      }
    }));
  }

  const handleKey=(e)=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}};
  const isEmpty=messages.length===0;
  const canSend=(input.trim()||files.length>0)&&!loading;

  // ─── COUNCIL SEND ─────────────────────────────────────────
  const sendCouncil = useCallback(async()=>{
    const q=councilInput.trim();
    if(!q||councilLoading) return;
    if(!hasAnyKey){setShowSettings(true);return;}

    // Decide participants: councilSelected or all enabled
    const participants = councilSelected.length>0
      ? enabledProviders.filter(p=>councilSelected.includes(p.id))
      : enabledProviders;
    if(!participants.length){setShowSettings(true);return;}

    setCouncilLoading(true);
    setCouncilResult(null);
    setCouncilFeedback(null);
    const initResp={};const initLoad={};
    participants.forEach(p=>{initResp[p.id]=null;initLoad[p.id]=true;});
    setCouncilResponses(initResp);
    setCouncilResponseLoading(initLoad);

    const ts=new Date().toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"});
    const newTimeline=[{type:"user",label:"USER PROMPT",content:q,time:ts,color:"var(--accent)"}];
    setCouncilTimeline(newTimeline);

    // Phase 1: all AI answer independently
    const phaseResults={};
    await Promise.allSettled(participants.map(async(prov)=>{
      const cfg=configs[prov.id];
      if(!cfg?.key) return;
      const t0=Date.now();
      try{
        const body={
          model:cfg.model||prov.models[0].id,
          max_tokens:1024,
          messages:[
            {role:"system",content:COUNCIL_SYSTEM_PROMPT},
            {role:"user",content:q}
          ]
        };
        const headers={"Content-Type":"application/json","Authorization":`Bearer ${cfg.key}`,...(prov.extraHeaders||{})};
        const res=await fetch(prov.baseUrl,{method:"POST",headers,body:JSON.stringify(body),signal:AbortSignal.timeout(30000)});
        const data=await res.json();
        if(!res.ok) throw new Error(data.error?.message||`HTTP ${res.status}`);
        const text=data.choices?.[0]?.message?.content||"";
        const verdict=VerdictDetector.detect(text);
        const confidence=ConfidenceEngine.extract(text);
        const latency=Date.now()-t0;
        const rData=RiskEngine.extract(text);
        phaseResults[prov.id]={text,verdict,confidence,latency,providerName:prov.name,riskData:rData,error:null};
        CouncilMemory.recordParticipation(prov.id,true);
        setCouncilResponses(r=>({...r,[prov.id]:{text,verdict,confidence,latency,providerName:prov.name}}));
      }catch(e){
        phaseResults[prov.id]={error:e.message,verdict:"NEUTRAL",confidence:0,providerName:prov.name};
        CouncilMemory.recordParticipation(prov.id,false);
        setCouncilResponses(r=>({...r,[prov.id]:{error:e.message,verdict:"NEUTRAL",confidence:0}}));
      }finally{
        setCouncilResponseLoading(l=>({...l,[prov.id]:false}));
      }
    }));

    // Update memory state
    const newMemory=CouncilMemory.getAll(PROVIDER_REGISTRY.map(p=>p.id));
    setCouncilMemory(newMemory);

    // Phase 2: weighted voting
    const mem=CouncilMemory.load();
    const {tallies,weights}=ConsensusEngine.computeWeightedVotes(phaseResults,mem);
    const consensus=ConsensusEngine.getConsensus(weights);
    const confidence=ConsensusEngine.getConfidencePct(weights,consensus);
    const allRisk=Object.values(phaseResults).filter(r=>r&&!r.error).map(r=>r.riskData).filter(Boolean);
    const topRisk=allRisk.reduce((best,r)=>r.score>(best?.score||0)?r:best,null)||{level:"LOW",score:30,factors:[]};

    // Phase 3: debate summary (use first available provider)
    let debateSummary="";
    const synth=participants.find(p=>phaseResults[p.id]&&!phaseResults[p.id].error);
    if(synth){
      try{
        const cfg=configs[synth.id];
        const prompt=DebateEngine.buildCritiquePrompt(q,phaseResults);
        const body={model:cfg.model||synth.models[0].id,max_tokens:800,messages:[{role:"user",content:prompt}]};
        const headers={"Content-Type":"application/json","Authorization":`Bearer ${cfg.key}`,...(synth.extraHeaders||{})};
        const res=await fetch(synth.baseUrl,{method:"POST",headers,body:JSON.stringify(body),signal:AbortSignal.timeout(25000)});
        const data=await res.json();
        debateSummary=data.choices?.[0]?.message?.content||"";
      }catch(e){ debateSummary=""; }
    }

    // Phase 4: final decision
    let finalDecision="";
    if(synth){
      try{
        const cfg=configs[synth.id];
        const prompt=DebateEngine.buildConsensusPrompt(q,phaseResults,tallies);
        const body={model:cfg.model||synth.models[0].id,max_tokens:512,messages:[{role:"user",content:prompt}]};
        const headers={"Content-Type":"application/json","Authorization":`Bearer ${cfg.key}`,...(synth.extraHeaders||{})};
        const res=await fetch(synth.baseUrl,{method:"POST",headers,body:JSON.stringify(body),signal:AbortSignal.timeout(20000)});
        const data=await res.json();
        finalDecision=data.choices?.[0]?.message?.content||"Consensus reached based on weighted voting.";
      }catch(e){ finalDecision="Consensus reached based on weighted voting of all council members."; }
    }

    // Build timeline entries
    const tl=[{type:"user",label:"USER PROMPT",content:q,time:ts,color:"var(--accent)"}];
    participants.forEach((prov,i)=>{
      const r=phaseResults[prov.id];
      if(!r||r.error) return;
      tl.push({type:"ai",label:`${prov.name} — ${getRole(prov.id).title}`,content:`${r.verdict} (${r.confidence}%) — ${r.text.slice(0,120)}…`,time:ts,color:prov.color});
    });
    tl.push({type:"debate",label:"DEBATE ENGINE — Analisa Konflik",content:debateSummary.slice(0,300)+(debateSummary.length>300?"…":""),time:ts,color:"#8b5cf6"});
    tl.push({type:"consensus",label:"CONSENSUS ENGINE — Keputusan Akhir",content:`${consensus} · Confidence ${confidence}% · Risk ${topRisk.level}`,time:ts,color:VerdictDetector.getVerdictColor(consensus)});
    setCouncilTimeline(tl);

    // Build parsed object for CouncilReport compatibility
    const successPids = participants.filter(p=>phaseResults[p.id]&&!phaseResults[p.id].error&&!phaseResults[p.id].timedOut);
    const timedOutPids = participants.filter(p=>phaseResults[p.id]?.timedOut);
    const failPids = participants.filter(p=>phaseResults[p.id]?.error&&!phaseResults[p.id]?.timedOut);
    const majorityTexts = successPids.filter(p=>phaseResults[p.id].verdict===consensus).map(p=>`${phaseResults[p.id].providerName}: ${(phaseResults[p.id].text||"").slice(0,120)}`);
    const minorityPids = successPids.filter(p=>phaseResults[p.id].verdict!==consensus);
    const parsed = {
      verdict: consensus,
      confidence,
      alasan: majorityTexts.slice(0,3),
      minoritas: minorityPids.length>0 ? minorityPids.map(p=>`${phaseResults[p.id].providerName} (${phaseResults[p.id].verdict})`).join(", ") : "Bulat",
      risiko: topRisk.factors.slice(0,2).join("; "),
      saran: finalDecision.slice(0,200),
    };
    setCouncilResult({
      consensus, confidence, tallies, weights,
      riskData:topRisk, debateSummary, finalDecision,
      responses:phaseResults, timestamp:ts,
      participantCount:participants.length,
      successCount:successPids.length,
      timedOutCount:timedOutPids.length,
      failCount:failPids.length,
      modeUsed:"council",
      parsed,
    });
    setCouncilLoading(false);
    setCouncilTab("session");
  },[councilInput,councilLoading,hasAnyKey,enabledProviders,councilSelected,configs,allProviders]);

          </div>
          <div style={{textAlign:"center",fontSize:10,color:"var(--t4)",fontFamily:"var(--mono)",letterSpacing:".04em"}}>
            Validasi Dulu · Jangan Menebak · Fibonacci Lolos Dulu Baru Entry{enabledProviders.length>1&&` · Fallback: ${enabledProviders.map(p=>p.shortName).join(" → ")}`}
          </div>
        </div>
      </div>
    </>}

    {/* ── ARENA VIEW ── */}
    {view==="arena" && <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"12px 16px",borderBottom:"1px solid var(--border-s)",background:"rgba(8,9,13,.95)",flexShrink:0}}>
        <div className="inner" style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
            <span style={{fontSize:13,fontWeight:600}}>AI Arena</span>
            <span style={{fontSize:11,color:"var(--t3)"}}>— Bandingkan jawaban semua AI sekaligus</span>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {enabledProviders.map(p=>{
              const sel=arenaSelected.includes(p.id);
              return <button key={p.id} onClick={()=>setArenaSelected(s=>sel?s.filter(x=>x!==p.id):[...s,p.id])} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 11px",borderRadius:99,background:sel?`rgba(${p.colorRgb},.12)`:"var(--s2)",border:`1px solid ${sel?`rgba(${p.colorRgb},.35)`:"var(--border)"}`,color:sel?p.color:"var(--t3)",fontSize:12,fontWeight:sel?600:400,transition:"all 150ms",cursor:"pointer"}}>
                <span style={{fontSize:11}}>{sel?"☑":"☐"}</span>
                <span style={{fontFamily:"var(--mono)"}}>{p.icon}</span>
                <span>{p.name}</span>
              </button>;
            })}
          </div>
          <div style={{display:"flex",gap:8}}>
            <input value={arenaInput} onChange={e=>setArenaInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendArena();}}} placeholder="Prompt untuk semua AI..." className="inp" style={{flex:1}}/>
            <button className="btn-primary" style={{width:"auto",padding:"10px 18px",flexShrink:0}} onClick={sendArena} disabled={!arenaInput.trim()||arenaSelected.length===0}>
              Kirim ke {arenaSelected.length} AI
            </button>
          </div>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:16}}>
        <div className="inner">
          {arenaSelected.length===0 && <div style={{textAlign:"center",padding:"40px 0",color:"var(--t3)"}}>
            <div style={{fontSize:32,marginBottom:12}}>⊡</div>
            <div style={{fontSize:14,fontWeight:500}}>Pilih AI di atas untuk dibandingkan</div>
            <div style={{fontSize:12,marginTop:6,color:"var(--t4)"}}>Kirim satu prompt, semua AI jawab bersamaan</div>
          </div>}
          {arenaSelected.length>0 && <div className="arena-grid">
            {arenaSelected.map(pid=>{
              const prov=allProviders.find(p=>p.id===pid);
              if(!prov) return null;
              return <ArenaCard key={pid} provider={prov} result={arenaResults[pid]} loading={arenaLoading[pid]}/>;
            })}
          </div>}
        </div>
      </div>
    </div>}

    {/* ── COUNCIL VIEW ── */}
    {view==="council" && <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>

      {/* Council sub-tabs */}
      <div className="council-tab-strip">
        {[{id:"session",label:"🗳 Session"},{id:"timeline",label:"📡 Timeline"},{id:"health",label:"❤ Health"},{id:"stats",label:"📊 Stats"}].map(t=>
          <button key={t.id} className={`nav-tab${councilTab===t.id?" active":""}`}
            onClick={()=>setCouncilTab(t.id)}
            style={councilTab===t.id?{color:"#f59e0b",borderColor:"rgba(245,158,11,.35)",background:"rgba(245,158,11,.08)"}:{}}>{t.label}</button>
        )}
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:10,color:"var(--t3)",fontFamily:"var(--mono)"}}>MEMBERS:</span>
          <span style={{fontSize:11,fontWeight:700,color:"#f59e0b",fontFamily:"var(--mono)"}}>{enabledProviders.length}</span>
          {councilLoading && <div style={{display:"flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:99,background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.25)"}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:"#f59e0b"}} className="council-live"/>
            <span style={{fontSize:10,color:"#f59e0b",fontFamily:"var(--mono)",fontWeight:700}}>RAPAT BERLANGSUNG</span>
          </div>}
        </div>
      </div>

      {/* Council prompt bar */}
      <div style={{padding:"10px 16px",borderBottom:"1px solid var(--border-s)",background:"rgba(8,9,13,.97)",flexShrink:0}}>
        <div className="inner" style={{display:"flex",flexDirection:"column",gap:8}}>
          {/* Member selector */}
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {enabledProviders.map(p=>{
              const sel=councilSelected.length===0||councilSelected.includes(p.id);
              const role=getRole(p.id);
              return <button key={p.id} onClick={()=>setCouncilSelected(s=>s.includes(p.id)?s.filter(x=>x!==p.id):s.length===enabledProviders.length-1?[]:([...s,p.id]))}
                style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:99,
                  background:sel?`rgba(${p.colorRgb},.1)`:"var(--s2)",
                  border:`1px solid ${sel?`rgba(${p.colorRgb},.3)`:"var(--border)"}`,
                  color:sel?p.color:"var(--t4)",fontSize:11,fontWeight:sel?600:400,transition:"all 150ms",cursor:"pointer"}}>
                <span style={{fontFamily:"var(--mono)"}}>{p.icon}</span>
                <span>{p.shortName}</span>
                <span style={{fontSize:9,color:sel?p.color+"99":"var(--t4)"}}>{role.abbr}</span>
              </button>;
            })}
            {councilSelected.length>0&&<button onClick={()=>setCouncilSelected([])} style={{padding:"4px 9px",borderRadius:99,background:"var(--s2)",border:"1px solid var(--border)",color:"var(--t3)",fontSize:10,cursor:"pointer"}}>All</button>}
          </div>
          <div style={{display:"flex",gap:8}}>
            <input value={councilInput} onChange={e=>setCouncilInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendCouncil();}}}
              placeholder="Ajukan untuk audit ke AI Council... (upload chart + tanya apakah Fibonacci Channel & Retracement lo sudah benar)"
              className="inp" style={{flex:1,borderColor:"rgba(245,158,11,.25)"}}
              disabled={councilLoading}/>
            <button onClick={sendCouncil} disabled={!councilInput.trim()||councilLoading||!hasAnyKey}
              style={{padding:"10px 18px",borderRadius:"var(--r12)",background:"rgba(245,158,11,.12)",border:"1px solid rgba(245,158,11,.3)",color:"#f59e0b",fontSize:12.5,fontWeight:700,whiteSpace:"nowrap",cursor:"pointer",transition:"all 160ms",opacity:(!councilInput.trim()||councilLoading)?0.4:1}}>
              {councilLoading?"Rapat…":"⚖ Mulai Rapat"}
            </button>
          </div>
          {!hasAnyKey&&<div style={{fontSize:11,color:"#fbbf24",fontFamily:"var(--mono)"}}>⚠ Setup minimal 1 API key untuk memulai Audit Council</div>}
        </div>
      </div>

      {/* Council body */}
      <div style={{flex:1,overflowY:"auto",padding:16}}>
        <div className="inner">

          {/* SESSION TAB */}
          {councilTab==="session" && <>
            {/* Empty state */}
            {!councilLoading&&!councilResult&&Object.keys(councilResponses).length===0&&<div style={{textAlign:"center",padding:"48px 0",color:"var(--t3)"}}>
              <div style={{fontSize:40,marginBottom:16,opacity:.5}}>⚖</div>
              <div style={{fontSize:16,fontWeight:700,marginBottom:8,color:"var(--t2)"}}>GIP Fibonacci Inspector — AI Council Audit</div>
              <div style={{fontSize:12.5,lineHeight:1.8,color:"var(--t3)",maxWidth:440,margin:"0 auto"}}>
                Semua AI mengaudit Fibonacci Channel dan Retracement lo secara independen.<br/>
                Menghasilkan satu keputusan audit konsensus berbasis SOP GIP yang identik.
              </div>
              <div style={{marginTop:24,display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
                {["Apakah Fibonacci Channel saya sudah dari fresh swing yang benar?","Fibonacci Retracement arah SELL — validasi titik 0 dan 100 saya.","Golden Pocket sudah kena, channel valid, apakah semua AI setuju entry?"].map((q,i)=>
                  <button key={i} onClick={()=>setCouncilInput(q)}
                    style={{padding:"8px 14px",borderRadius:"var(--r8)",background:"var(--s2)",border:"1px solid var(--border)",color:"var(--t2)",fontSize:12,cursor:"pointer",textAlign:"left",maxWidth:260,lineHeight:1.4}}>
                    {q}
                  </button>
                )}
              </div>
            </div>}

            {/* Seat grid — live status during loading */}
            {(councilLoading||Object.keys(councilResponses).length>0)&&<>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:11,fontFamily:"var(--mono)",color:"var(--t3)",marginBottom:8,letterSpacing:".06em"}}>
                  KURSI DEWAN — {Object.values(councilResponseLoading).filter(Boolean).length} SEDANG ANALISA
                </div>
                <div className="seat-grid">
                  {enabledProviders.filter(p=>councilResponses[p.id]!==undefined||councilResponseLoading[p.id]).map(prov=>(
                    <SeatCard key={prov.id}
                      provider={prov}
                      response={councilResponses[prov.id]}
                      memory={councilMemory}
                      loading={!!councilResponseLoading[prov.id]}
                      role={getRole(prov.id)}
                    />
                  ))}
                </div>
              </div>
            </>}

            {/* Final verdict */}
            {councilResult&&<>
              <CouncilVerdict result={councilResult} allProviders={allProviders}/>
              <FeedbackWidget
                councilResult={councilResult}
                allProviders={allProviders}
                onFeedback={(type)=>{
                  setCouncilFeedback(type);
                  const newMem=CouncilMemory.getAll(PROVIDER_REGISTRY.map(p=>p.id));
                  setCouncilMemory(newMem);
                }}
              />
            </>}
          </>}

          {/* TIMELINE TAB */}
          {councilTab==="timeline" && <>
            {councilTimeline.length===0
              ? <div style={{textAlign:"center",padding:"40px 0",color:"var(--t3)"}}>
                  <div style={{fontSize:28,marginBottom:12,opacity:.4}}>📡</div>
                  <div style={{fontSize:13}}>Belum ada rapat. Kirim prompt pertama.</div>
                </div>
              : <div style={{paddingBottom:12}}>
                  <div style={{fontSize:11,fontFamily:"var(--mono)",color:"var(--t3)",marginBottom:16,letterSpacing:".06em"}}>DISCUSSION TIMELINE</div>
                  {councilTimeline.map((item,i)=>(
                    <TimelineItem key={i} {...item} label={item.label} content={item.content} color={item.color} time={item.time}/>
                  ))}
                </div>
            }
          </>}

          {/* HEALTH TAB */}
          {councilTab==="health" && <ProviderHealthDashboard allProviders={allProviders} configs={configs}/>}

          {/* STATS TAB */}
          {councilTab==="stats" && <CouncilStatsPanel allProviders={allProviders} memory={councilMemory}/>}

        </div>
      </div>
    </div>}

    {/* SETTINGS */}
    {showSettings && <SettingsPage allProviders={allProviders} configs={configs} onConfigChange={handleConfigChange} onClose={()=>setShowSettings(false)} onAddProvider={handleAddProvider} onRemoveCustom={handleRemoveCustom} testStatus={testStatus} onTest={handleTest}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
