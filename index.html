// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getIcon(type) {
  if (!type) return "📄";
  if (IMAGE_TYPES.includes(type)) return "🖼️";
  if (type.includes("pdf")) return "📕";
  if (type.includes("csv")||type.includes("sheet")||type.includes("excel")) return "📊";
  if (type.includes("word")||type.includes("document")) return "📝";
  if (type.includes("text")||type.includes("txt")) return "📄";
  if (type.includes("json")) return "🗂️";
  if (type.includes("zip")||type.includes("rar")) return "🗜️";
  return "📎";
}
async function toBase64(file) {
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(",")[1]); r.onerror=rej; r.readAsDataURL(file); });
}
async function toText(file) {
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsText(file); });
}
function loadStorage() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}"); } catch { return {}; }
}
function saveStorage(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function FilePreview({f, onRemove}) {
  const isImg = IMAGE_TYPES.includes(f.type);
  const [url, setUrl] = useState(null);
  useEffect(()=>{
    if(isImg){ const u=URL.createObjectURL(f); setUrl(u); return ()=>URL.revokeObjectURL(u); }
  },[f]);
  return (
    <div style={{display:"inline-flex",flexDirection:"column",alignItems:"center",gap:3,position:"relative"}}>
      {isImg && url ? (
        <div style={{position:"relative"}}>
          <img src={url} alt={f.name} style={{width:56,height:56,objectFit:"cover",borderRadius:8,border:"1px solid rgba(34,211,238,.3)"}}/>

  );

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  // configs: { gemini:{key,model}, groq:{key,model}, openrouter:{key,model} }
  const [configs, setConfigs] = useState(()=>{
    const s = loadStorage();
    const c = {};
    for (const pid of PROVIDER_ORDER) {
      c[pid] = { key: s[pid]?.key||"", model: s[pid]?.model||PROVIDERS[pid].models[0].id };
    }
    return c;
  });
  const [activeProvider, setActiveProvider] = useState(()=>{
    const s = loadStorage();
    return s.activeProvider || "gemini";
  });
  const [providerStatus, setProviderStatus] = useState({}); // pid -> "ok"|"warn"|"err"|"idle"
  const [showSettings, setShowSettings] = useState(false);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [loadingInfo, setLoadingInfo] = useState(""); // e.g. "Mencoba Gemini..."
  const [pair, setPair] = useState("");
  const [files, setFiles] = useState([]);
  const [dragging, setDragging] = useState(false);
  const [fileErr, setFileErr] = useState("");
  const bottomRef = useRef(null);
  const inputRef = useRef(null);
  const fileRef = useRef(null);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[messages,loading]);

  // Check if at least one provider is configured
  const hasAnyKey = PROVIDER_ORDER.some(pid => configs[pid]?.key?.length > 8);

  // Get ordered list of providers to try (active first, then others with keys)
  const getFallbackOrder = useCallback(() => {
    const order = [activeProvider, ...PROVIDER_ORDER.filter(p=>p!==activeProvider)];
    return order.filter(pid => configs[pid]?.key?.length > 8);
  }, [activeProvider, configs]);

  const currentModel = useMemo(() => {
    const cfg = configs[activeProvider];
    const prov = PROVIDERS[activeProvider];
    const model = prov.models.find(m=>m.id===cfg?.model) || prov.models[0];
    return model;
  }, [activeProvider, configs]);

  const addFiles = useCallback((newFiles) => {
    setFileErr("");
    const toAdd = [];
    for (const f of newFiles) {
      if (f.size > MAX_SIZE) { setFileErr(`"${f.name}" terlalu besar (maks 20MB)`); continue; }
      if (files.some(x=>x.name===f.name&&x.size===f.size)) continue;
      toAdd.push(f);
    }
    setFiles(prev=>[...prev,...toAdd].slice(0,5));
  },[files]);

  useEffect(()=>{
    const onPaste = (e) => {
      const items = e.clipboardData?.items || [];
      const fs = [];
      for (const it of items) { if(it.kind==="file"){ const f=it.getAsFile(); if(f) fs.push(f); } }
      if (fs.length) addFiles(fs);
    };
    window.addEventListener("paste", onPaste);
    return ()=>window.removeEventListener("paste", onPaste);
  },[addFiles]);

  const saveConfigs = (newConfigs, newActiveProvider) => {
    setConfigs(newConfigs);
    if (newActiveProvider) setActiveProvider(newActiveProvider);
    const toSave = { ...newConfigs, activeProvider: newActiveProvider||activeProvider };
    saveStorage(toSave);
  };

  const handleSettingsSave = (draft) => {
    // find first provider with key as active if current has no key
    let newActive = activeProvider;
    if (!draft[newActive]?.key || draft[newActive].key.length < 8) {
      newActive = PROVIDER_ORDER.find(pid => draft[pid]?.key?.length > 8) || activeProvider;
    }
    saveConfigs(draft, newActive);
    setShowSettings(false);
  };

  // ── Content builders ────────────────────────────────────────────────────────
  const buildUserContent = async (text, fileList, isVision) => {
    const attachments = [];
    if (!fileList || fileList.length === 0) return { apiContent: text || " ", attachments };
    if (isVision) {
      const parts = [];
      for (const f of fileList) {
        if (IMAGE_TYPES.includes(f.type)) {
          let b64; try { b64 = await toBase64(f); } catch(e){ continue; }
          parts.push({type:"image_url", image_url:{url:`data:${f.type};base64,${b64}`}});
          attachments.push({type:"image", name:f.name, mediaType:f.type, data:b64});
        } else {
          let txt="(binary)"; try { txt=await toText(f); } catch(e){}
          parts.push({type:"text", text:`[File: ${f.name}]\n${txt.slice(0,5000)}`});
          attachments.push({type:"file", name:f.name, mediaType:f.type, textContent:txt.slice(0,5000)});
        }
      }
      parts.push({type:"text", text: text||"Analisa file/gambar ini."});
      return { apiContent: parts, attachments };
    } else {
      let combined = "";
      for (const f of fileList) {
        if (IMAGE_TYPES.includes(f.type)) {
          let b64; try { b64=await toBase64(f); } catch(e){}
          combined += `[Gambar: ${f.name} — pakai model Vision untuk analisa]\n`;
          if (b64) attachments.push({type:"image", name:f.name, mediaType:f.type, data:b64});
        } else {
          let txt="(binary)"; try { txt=await toText(f); } catch(e){}
          combined += `[File: ${f.name}]\n${txt.slice(0,5000)}\n\n`;
          attachments.push({type:"file", name:f.name, mediaType:f.type, textContent:txt.slice(0,5000)});
        }
      }
      return { apiContent: (combined+(text||"")).trim()||" ", attachments };
    }
  };

  const contentToString = (c) => {
    if (!c) return "";
    if (typeof c === "string") return c;
    if (Array.isArray(c)) return c.map(p=>p?.type==="text"?p.text||"":p?.type==="image_url"?"[gambar]":"").join("\n").trim();
    return String(c);
  };

  const historyToApi = (msgs, isVision) => msgs.map(m => {
    if (m.role==="assistant") return {role:"assistant", content: contentToString(m.content)||" "};
    const atts = m.attachments||[];
    if (!atts.length) return {role:"user", content: contentToString(m.content)||" "};
    if (isVision) {
      const parts = [];
      for (const a of atts) {
        if (a.type==="image"&&a.data) parts.push({type:"image_url", image_url:{url:`data:${a.mediaType};base64,${a.data}`}});
        else if (a.name) parts.push({type:"text", text:`[File: ${a.name}]\n${a.textContent||""}`});
      }
      parts.push({type:"text", text: contentToString(m.content)||"Analisa ini."});
      return {role:"user", content: parts};
    } else {
      let txt="";
      for (const a of atts) txt += a.type==="image"?`[Gambar: ${a.name}]\n`:`[File: ${a.name}]\n${a.textContent||""}\n\n`;
      txt += contentToString(m.content);
      return {role:"user", content: txt.trim()||" "};
    }
  });

  // ── Single provider call ─────────────────────────────────────────────────
  const callProvider = async (pid, apiContent, prevApiMsgs) => {
    const cfg = configs[pid];
    const prov = PROVIDERS[pid];
    const modelObj = prov.models.find(m=>m.id===cfg.model)||prov.models[0];
    const isVision = modelObj.vision;

    // Rebuild content for this provider's vision capability
    let safeContent = apiContent;
    if (!isVision && Array.isArray(apiContent)) {
      // Flatten to string for non-vision models
      safeContent = contentToString(apiContent);
    }
    if (!safeContent || (typeof safeContent==="string"&&!safeContent.trim()) || (Array.isArray(safeContent)&&!safeContent.length)) {
      safeContent = " ";
    }

    // Rebuild history for this provider's vision capability
    const histMsgs = historyToApi(messages, isVision);

    const body = {
      model: cfg.model || modelObj.id,
      max_tokens: 2048,
      messages: [
        {role:"system", content: SYSTEM_PROMPT},
        ...histMsgs,
        {role:"user", content: safeContent}
      ]
    };

    // OpenRouter extra headers
    const headers = {
      "Content-Type":"application/json",
      "Authorization":`Bearer ${cfg.key}`
    };
    if (pid==="openrouter") {
      headers["HTTP-Referer"] = "https://gipmaster.ai";
      headers["X-Title"] = "GIP Master AI";
    }

    const res = await fetch(prov.baseUrl, {method:"POST", headers, body:JSON.stringify(body)});
    const data = await res.json();

    if (!res.ok) {
      const errMsg = data.error?.message || `HTTP ${res.status}`;
      // Rate limit or quota errors → fallback
      const isRateLimit = res.status===429 || errMsg.toLowerCase().includes("quota") || errMsg.toLowerCase().includes("rate") || errMsg.toLowerCase().includes("limit") || errMsg.toLowerCase().includes("token");
      if (isRateLimit) throw Object.assign(new Error(errMsg), {isRateLimit:true});
      if (res.status===401) throw Object.assign(new Error("API Key tidak valid untuk "+prov.name), {isAuth:true});
      throw new Error(errMsg);
    }

    const reply = data.choices?.[0]?.message?.content || "Error: no response";
    return { reply, usedProvider: prov.name, providerIcon: prov.icon, providerColor: prov.color, usedModel: cfg.model||modelObj.id };
  };

  // ── Send with auto-fallback ──────────────────────────────────────────────
  const sendMessage = async (text) => {
    const userText = (text || input).trim();
    if ((!userText && files.length===0) || loading) return;
    if (!hasAnyKey) { setShowSettings(true); return; }
    setFileErr("");
    const curFiles = [...files];
    setFiles([]); setInput(""); setLoading(true); setLoadingInfo("");

    try {
      const isVisionActive = PROVIDERS[activeProvider].models.find(m=>m.id===configs[activeProvider]?.model)?.vision ?? true;
      const { apiContent, attachments } = await buildUserContent(userText, curFiles, isVisionActive);
      const userMsg = {role:"user", content:userText, attachments};
      setMessages(prev=>[...prev, userMsg]);

      const tryOrder = getFallbackOrder();
      if (!tryOrder.length) {
        setMessages(prev=>[...prev,{role:"assistant",content:"⚠️ Belum ada API key yang diisi. Tap ⚙ untuk setup."}]);
        return;
      }

      let lastErr = null;
      for (let i=0; i<tryOrder.length; i++) {
        const pid = tryOrder[i];
        const prov = PROVIDERS[pid];
        setLoadingInfo(i===0 ? `🤖 ${prov.name}...` : `⚡ Rate limit! Beralih ke ${prov.name}...`);
        try {
          const result = await callProvider(pid, apiContent, []);
          setProviderStatus(s=>({...s,[pid]:"ok"}));
          // If we fell back, update active provider
          if (pid !== activeProvider) {
            setActiveProvider(pid);
            saveStorage({...configs, activeProvider:pid});
          }
          setMessages(prev=>[...prev,{role:"assistant", content:result.reply, usedProvider:result.usedProvider, providerIcon:result.providerIcon, providerColor:result.providerColor}]);
          lastErr = null;
          break;
        } catch(e) {
          lastErr = e;
          if (e.isRateLimit) {
            setProviderStatus(s=>({...s,[pid]:"warn"}));
            continue; // try next provider
          }
          if (e.isAuth) {
            setProviderStatus(s=>({...s,[pid]:"err"}));
            continue;
          }
          // Other error: still try next
          setProviderStatus(s=>({...s,[pid]:"err"}));
          continue;
        }
      }
      if (lastErr) {
        setMessages(prev=>[...prev,{role:"assistant",content:`⚠️ Semua provider gagal.\n\nError terakhir: ${lastErr.message}\n\nTambah API key provider lain via ⚙ atau coba lagi nanti.`}]);
      }
    } catch(e) {
      setMessages(prev=>[...prev,{role:"assistant",content:`⚠️ Error: ${e.message}`}]);
    } finally {
      setLoading(false);
      setLoadingInfo("");
      setTimeout(()=>inputRef.current?.focus(),100);
    }
  };

  const handleKey = (e) => { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();} };

  const isEmpty = messages.length===0;
  const canSend = (input.trim()||files.length>0)&&!loading;
  const curProv = PROVIDERS[activeProvider];

  if (!hasAnyKey) {
    return (
      <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#070b14",backgroundImage:"linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px)",backgroundSize:"28px 28px",padding:20,overflowY:"auto"}}>
        <div style={{maxWidth:420,width:"100%",background:"linear-gradient(180deg,rgba(15,22,40,.95),rgba(8,12,24,.98))",border:"1px solid #1c2740",borderRadius:20,padding:26}}>
          <div style={{textAlign:"center",marginBottom:22}}>
            <div style={{fontSize:30,marginBottom:10}}>📊</div>
            <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:19,marginBottom:5}}>GIP <span style={{color:"#22d3ee"}}>MASTER</span> AI</div>
            <div style={{fontSize:11,color:"#8893ad",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".06em"}}>MULTI-PROVIDER · AUTO FALLBACK · FREE</div>
          </div>

          <div style={{background:"rgba(47,230,164,.06)",border:"1px solid rgba(47,230,164,.2)",borderRadius:12,padding:"12px 14px",marginBottom:18,fontSize:12,lineHeight:1.8,color:"#e7ecf7"}}>
            <div style={{color:"#2fe6a4",fontFamily:"'JetBrains Mono',monospace",fontSize:10,marginBottom:8}}>🔀 SISTEM AUTO-FALLBACK:</div>
            <div>Daftarkan beberapa API key dari provider berbeda.</div>
            <div>Jika satu provider kena rate limit → <span style={{color:"#22d3ee"}}>otomatis ganti</span> ke provider berikutnya.</div>
            <div style={{marginTop:8,color:"#8893ad",fontSize:11}}>
              <span style={{color:"#4285f4"}}>🟦 Gemini</span> → <span style={{color:"#f97316"}}>⚡ Groq</span> → <span style={{color:"#8b5cf6"}}>🔀 OpenRouter</span>
            </div>
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:18}}>
            {PROVIDER_ORDER.map(pid=>{
              const p = PROVIDERS[pid];
              return (
                <div key={pid} style={{background:"rgba(13,20,36,.8)",border:"1px solid #1c2740",borderRadius:10,padding:"10px 13px",fontSize:11.5,lineHeight:1.6,color:"#8893ad"}}>

                    <span style={{fontSize:16}}>{p.icon}</span>

                    <span style={{fontSize:9,color:"#2fe6a4",fontFamily:"'JetBrains Mono',monospace",background:"rgba(47,230,164,.08)",border:"1px solid rgba(47,230,164,.2)",borderRadius:4,padding:"1px 5px"}}>GRATIS</span>
                  </div>
                  <div style={{fontSize:10.5}}>
                    <span style={{color:"#4a5568"}}>Key: </span>
                    <span style={{color:"#22d3ee",fontFamily:"'JetBrains Mono',monospace"}}>{p.keyUrl}</span>
                    <span style={{color:"#4a5568"}}> → {p.keyNote}</span>
                  </div>
                </div>
              );
            })}
          </div>

          <button
            onClick={()=>setShowSettings(true)}
            style={{width:"100%",padding:"13px",borderRadius:10,background:"rgba(34,211,238,.15)",border:"1px solid rgba(34,211,238,.4)",color:"#22d3ee",fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:14,cursor:"pointer",transition:"all .15s"}}
          >⚙ SETUP API KEYS →</button>
          <div style={{textAlign:"center",marginTop:12,fontSize:10,color:"#2a3a5c",fontFamily:"'JetBrains Mono',monospace"}}>Cukup 1 key untuk mulai · Tambah lebih untuk auto-fallback</div>
        </div>
        {showSettings && <SettingsModal configs={configs} onSave={handleSettingsSave} onClose={()=>setShowSettings(false)}/>}
      </div>
    );
  }

  return (
    <div
      style={{height:"100vh",display:"flex",flexDirection:"column",background:"#070b14",backgroundImage:"linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px)",backgroundSize:"28px 28px",color:"#e7ecf7",fontFamily:"'Inter',sans-serif",position:"relative"}}
      onDragOver={e=>{e.preventDefault();setDragging(true);}}
      onDragLeave={()=>setDragging(false)}
      onDrop={e=>{e.preventDefault();setDragging(false);addFiles(Array.from(e.dataTransfer.files));}}
    >
      {dragging&&(
        <div style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(7,11,20,.92)",display:"flex",alignItems:"center",justifyContent:"center",border:"2px dashed #22d3ee",borderRadius:16,pointerEvents:"none",animation:"fadeIn .15s ease"}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:40,marginBottom:10}}>📎</div><div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:18,color:"#22d3ee"}}>Drop file di sini</div></div>
        </div>
      )}

      {/* HEADER */}
      <header style={{padding:"9px 14px",borderBottom:"1px solid #1c2740",background:"rgba(7,11,20,.97)",backdropFilter:"blur(20px)",flexShrink:0,zIndex:10}}>
        <div style={{maxWidth:680,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
          {/* Logo */}
          <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            <div style={{width:30,height:30,borderRadius:8,background:"linear-gradient(135deg,#0d1424,#1c2740)",border:`1.5px solid ${curProv.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>📊</div>
            <div>
              <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:13}}>GIP <span style={{color:"#22d3ee"}}>MASTER</span> AI</div>
              <div style={{display:"flex",alignItems:"center",gap:4,marginTop:1}}>
                <div style={{width:4,height:4,borderRadius:"50%",background:"#2fe6a4",animation:"pulse 2s infinite"}}/>
                <span style={{fontSize:8.5,color:"#8893ad",fontFamily:"'JetBrains Mono',monospace"}}>{curProv.icon} {curProv.name} · {configs[activeProvider]?.model?.split("/").pop()||""}</span>
              </div>
            </div>
          </div>

          {/* Provider pills */}
          <div style={{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"center",flex:1,overflow:"hidden"}}>
            {PROVIDER_ORDER.filter(pid=>configs[pid]?.key?.length>8).map(pid=>(
              <button
                key={pid}
                onClick={()=>{ setActiveProvider(pid); saveStorage({...configs,activeProvider:pid}); }}
                title={PROVIDERS[pid].name}
                style={{
                  display:"flex",alignItems:"center",gap:4,padding:"3px 8px",borderRadius:6,
                  background:pid===activeProvider?"rgba(34,211,238,.12)":"rgba(13,20,36,.8)",
                  border:`1px solid ${pid===activeProvider?"#22d3ee":"#1c2740"}`,
                  cursor:"pointer",fontSize:10,fontFamily:"'JetBrains Mono',monospace",
                  color:pid===activeProvider?"#22d3ee":"#8893ad",transition:"all .15s",whiteSpace:"nowrap"
                }}
              >
                <div className={`status-dot ${providerStatus[pid]==="ok"?"status-ok":providerStatus[pid]==="warn"?"status-warn":providerStatus[pid]==="err"?"status-err":"status-idle"}`}/>
                <span>{PROVIDERS[pid].icon}</span>
                <span style={{display:window.innerWidth>480?"inline":"none"}}>{PROVIDERS[pid].name}</span>
              </button>
            ))}
          </div>

          {/* Right controls */}
          <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
            <input value={pair} onChange={e=>setPair(e.target.value.toUpperCase())} placeholder="PAIR" style={{width:60,background:"#0d1424",border:"1px solid #1c2740",borderRadius:7,padding:"4px 7px",color:"#e7ecf7",fontFamily:"'JetBrains Mono',monospace",fontSize:10,outline:"none",textAlign:"center"}}/>
            <button onClick={()=>setShowSettings(true)} style={{background:"transparent",border:"1px solid #1c2740",borderRadius:7,padding:"4px 8px",color:"#8893ad",fontSize:10,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>⚙</button>
          </div>
        </div>
      </header>

      {/* CHAT */}
      <div style={{flex:1,overflowY:"auto",padding:"14px 12px"}}>
        <div style={{maxWidth:660,margin:"0 auto"}}>
          {isEmpty&&(
            <div style={{textAlign:"center",paddingTop:20,paddingBottom:16,animation:"fadeIn .4s ease"}}>
              <div style={{display:"inline-flex",alignItems:"center",gap:4,flexWrap:"wrap",background:"rgba(34,211,238,.08)",border:"1px solid rgba(34,211,238,.2)",borderRadius:999,padding:"5px 13px",marginBottom:18,fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:"#22d3ee",letterSpacing:".07em",justifyContent:"center"}}>
                {["H4","S&D","S&R","FIB","PA","M5","M1","ENTRY"].map((f,i,arr)=>(
                  <span key={f} style={{display:"flex",alignItems:"center",gap:4}}>
                    <span style={{color:i===arr.length-1?"#2fe6a4":"#e7ecf7",fontWeight:i===arr.length-1?700:400}}>{f}</span>
                    {i<arr.length-1&&<span style={{color:"#1c2740"}}>+</span>}
                  </span>
                ))}
              </div>
              <h1 style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:"clamp(17px,5vw,24px)",letterSpacing:"-.01em",marginBottom:7}}>
                Ceritain kondisi chart lo,<br/><span style={{color:"#22d3ee"}}>gue analisa arahnya.</span>
              </h1>
              <p style={{color:"#8893ad",fontSize:12,lineHeight:1.6,marginBottom:6}}>H4 structure, zona S&D, posisi harga sekarang.</p>
              <p style={{color:"rgba(47,230,164,.75)",fontSize:11,lineHeight:1.5,marginBottom:12}}>
                📎 Upload screenshot chart — gue langsung analisa visual
              </p>
              {/* Provider status */}
              <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap",marginBottom:20}}>
                {PROVIDER_ORDER.map(pid=>{
                  const hasKey = configs[pid]?.key?.length>8;
                  return (
                    <div key={pid} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 8px",borderRadius:6,background:hasKey?"rgba(47,230,164,.06)":"rgba(13,20,36,.5)",border:hasKey?"1px solid rgba(47,230,164,.2)":"1px solid #1c2740",fontSize:10,color:hasKey?"#2fe6a4":"#4a5568",fontFamily:"'JetBrains Mono',monospace"}}>
                      <span>{PROVIDERS[pid].icon}</span>
                      <span>{PROVIDERS[pid].name}</span>
                      <span>{hasKey?"✓":"○"}</span>
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6,maxWidth:500,margin:"0 auto",textAlign:"left"}}>
                <div style={{fontSize:9.5,color:"#8893ad",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".08em",marginBottom:2}}>PERTANYAAN UMUM:</div>
                {QUICK_PROMPTS.map((q,i)=>(
                  <button key={i} className="quick-btn" onClick={()=>sendMessage(q)} style={{background:"#0d1424",border:"1px solid #1c2740",borderRadius:10,padding:"9px 12px",color:"#8893ad",fontSize:12,cursor:"pointer",textAlign:"left",transition:"all .15s",lineHeight:1.4,fontFamily:"'Inter',sans-serif"}}>{q}</button>
                ))}
              </div>
            </div>
          )}
          {messages.map((msg,i)=><Message key={i} msg={msg}/>)}
          {loading&&(
            <div style={{display:"flex",justifyContent:"flex-start",marginBottom:12,flexDirection:"column",gap:6}}>
              {loadingInfo&&<div style={{fontSize:10,color:"#22d3ee",fontFamily:"'JetBrains Mono',monospace",paddingLeft:42,animation:"fadeIn .2s ease"}}>{loadingInfo}</div>}
              <div style={{display:"flex"}}>
                <div style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,#0d1424,#1c2740)",border:`1.5px solid ${curProv.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0,marginRight:10,marginTop:2}}>{curProv.icon}</div>
                <div style={{background:"linear-gradient(180deg,rgba(15,22,40,.9),rgba(8,12,24,.95))",border:"1px solid #1c2740",borderRadius:"16px 16px 16px 4px"}}><TypingIndicator/></div>
              </div>
            </div>
          )}
          <div ref={bottomRef}/>
        </div>
      </div>

      {/* INPUT */}
      <div style={{padding:"9px 12px 13px",borderTop:"1px solid #1c2740",background:"rgba(7,11,20,.97)",backdropFilter:"blur(20px)",flexShrink:0}}>
        <div style={{maxWidth:660,margin:"0 auto"}}>
          {!isEmpty&&(
            <div style={{display:"flex",gap:5,marginBottom:7,flexWrap:"wrap"}}>
              {QUICK_PROMPTS.slice(0,3).map((q,i)=>(
                <button key={i} className="quick-btn" onClick={()=>sendMessage(q)} style={{background:"transparent",border:"1px solid #1c2740",borderRadius:7,padding:"3px 8px",color:"#8893ad",fontSize:10,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",transition:"all .15s",whiteSpace:"nowrap"}}>
                  {q.length>34?q.slice(0,34)+"…":q}
                </button>
              ))}
            </div>
          )}

          {files.length > 0 && (
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:8,padding:"8px 10px",background:"rgba(34,211,238,.04)",borderRadius:10,border:"1px solid rgba(34,211,238,.15)"}}>
              {files.map((f,i)=><FilePreview key={i} f={f} onRemove={()=>setFiles(prev=>prev.filter((_,j)=>j!==i))}/>)}
            </div>
          )}
          {fileErr && <div style={{fontSize:11,color:"#ff6b6b",marginBottom:6,fontFamily:"'JetBrains Mono',monospace",padding:"4px 8px",background:"rgba(255,107,107,.08)",borderRadius:6,border:"1px solid rgba(255,107,107,.2)"}}>⚠️ {fileErr}</div>}

          <input ref={fileRef} type="file" multiple accept="*/*" style={{display:"none"}} onChange={e=>{addFiles(Array.from(e.target.files));e.target.value="";}}/>

          <div style={{display:"flex",gap:8,alignItems:"flex-end",background:"#0d1424",border:"1px solid #1c2740",borderRadius:14,padding:"9px 9px 9px 13px"}}>
            <button className="upload-btn" onClick={()=>fileRef.current?.click()} disabled={loading} style={{width:34,height:34,borderRadius:9,flexShrink:0,background:"rgba(47,230,164,.08)",border:"1px solid rgba(47,230,164,.25)",color:"#2fe6a4",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,transition:"all .15s"}}>📎</button>
            <textarea
              ref={inputRef}
              value={input}
              onChange={e=>setInput(e.target.value)}
              onKeyDown={handleKey}
              placeholder={`Kondisi ${pair||"chart"} lo... H4, S&D, harga sekarang (atau upload screenshot)`}
              rows={1}
              style={{flex:1,background:"transparent",border:"none",color:"#e7ecf7",fontSize:13,lineHeight:1.55,resize:"none",maxHeight:100,overflowY:"auto",caretColor:"#22d3ee",fontFamily:"'Inter',sans-serif"}}
              onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,100)+"px";}}
            />
            <button className="send-btn" onClick={()=>sendMessage()} disabled={!canSend} style={{width:34,height:34,borderRadius:9,flexShrink:0,background:"rgba(34,211,238,.12)",border:"1px solid rgba(34,211,238,.3)",color:"#22d3ee",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,transition:"all .15s"}}>↑</button>
          </div>
          <div style={{textAlign:"center",marginTop:7,fontSize:9.5,color:"#2a3a5c",fontFamily:"'JetBrains Mono',monospace"}}>DISIPLIN PADA SOP &gt; FEELING — Auto-fallback: {PROVIDER_ORDER.filter(p=>configs[p]?.key?.length>8).map(p=>PROVIDERS[p].icon).join(" → ") || "belum setup"}</div>
        </div>
      </div>

      {showSettings && <SettingsModal configs={configs} onSave={handleSettingsSave} onClose={()=>setShowSettings(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
